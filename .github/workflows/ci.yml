name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify dependency versions
        run: npm ls --depth=0

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:coverage

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: npm run dev &
        env:
          BROWSER: none

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000/Data-Structures-Visualized/ --timeout 30000

      - name: Run E2E tests (core)
        run: node e2e/test-core.js
        timeout-minutes: 10

      - name: Run E2E tests (comprehensive)
        run: node e2e/test-comprehensive.js
        timeout-minutes: 10

      - name: Run E2E tests (a11y)
        run: node e2e/test-a11y.js
        timeout-minutes: 10

      - name: Upload coverage report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45bf83
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/

      - name: Upload build artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45bf83
        if: always()
        with:
          name: dist-node-${{ matrix.node-version }}
          path: dist/

      - name: Upload E2E reports
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45bf83
        if: always()
        with:
          name: e2e-reports-node-${{ matrix.node-version }}
          path: |
            playwright-report/
            e2e/test-results.json
            test-results/
