<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Data Structures Visualized</title>
    <script>
      // SPA redirect: convert /path/to/segment to /Data-Structures-Visualized/?/path/to/segment
      // Then index.html reads the query string and routes accordingly
      var pathSegmentsToKeep = 1; // keep "/Data-Structures-Visualized/"
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
